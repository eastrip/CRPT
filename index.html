<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #161616;
      --border: #1e1e1e;
      --border-bright: #2e2e2e;
      --text: #e8e8e8;
      --text-dim: #555;
      --text-muted: #333;
      --accent: #c8ff00;
      --accent-dim: rgba(200, 255, 0, 0.08);
      --green: #00e676;
      --red: #ff4444;
    }

    html, body {
      height: 100dvh; max-height: 100dvh;
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif; overflow: hidden;
    }
    .app { display: flex; flex-direction: column; height: 100dvh; }

    /* ── Tabs ── */
    header { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 18px 12px; background: transparent; border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
    }
    .tab + .tab { border-left: 1px solid var(--border); }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.02); }
    .tab.active.investments { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-dim); }
    .tab.active.pnl { color: var(--text); border-bottom-color: var(--text-dim); background: rgba(255,255,255,0.02); }

    /* ── Main ── */
    main { flex: 1; overflow-y: auto; padding: 14px 12px; }
    .section { display: none; }
    .section.active { display: block; }

    /* ── Section header ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
    }
    .section-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim);
    }
    .header-actions { display: flex; gap: 8px; }
    .btn-sm {
      display: flex; align-items: center; gap: 6px; padding: 7px 14px;
      background: transparent; border: 1px solid var(--border); border-radius: 2px;
      color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s;
    }
    .btn-sm:hover { border-color: var(--border-bright); color: var(--text); }
    .btn-sm.accent:hover { border-color: rgba(200,255,0,0.4); color: var(--accent); }
    .btn-sm svg { width: 12px; height: 12px; }
    .btn-sm.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 180px; gap: 10px;
    }
    .empty-state .empty-icon { font-size: 26px; opacity: 0.12; }
    .empty-state p { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--text-muted); }

    /* ── Summary bar ── */
    .summary-bar {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 12px;
    }
    .summary-cell {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 2px; padding: 10px 12px;
    }
    .summary-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
    .summary-value { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
    .summary-value.up { color: var(--green); }
    .summary-value.down { color: var(--red); }

    /* ── Crypto cards ── */
    .crypto-list { display: flex; flex-direction: column; gap: 1px; }
    .crypto-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 2px; padding: 9px 12px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .crypto-card:first-child { border-radius: 2px 2px 0 0; }
    .crypto-card + .crypto-card { border-top: none; border-radius: 0; }
    .crypto-card:last-child { border-radius: 0 0 2px 2px; }

    /* Row 1: symbol | buy | price | buttons */
    .card-row1 {
      display: flex; align-items: center; gap: 0;
    }
    .card-symbol {
      font-size: 13px; font-weight: 700; letter-spacing: 0.02em;
      white-space: nowrap; flex: 0 0 auto; margin-right: 6px;
    }
    .card-pair {
      font-family: 'DM Mono', monospace; font-size: 9px;
      color: var(--text-muted); flex: 1; /* pushes rest right */
    }
    .card-buy {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--text-muted); white-space: nowrap; margin-right: 10px;
    }
    .card-price {
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      color: var(--text); white-space: nowrap; margin-right: 10px;
    }

    /* Row 2: pnl | 24h | spacer | buttons */
    .card-row2 {
      display: flex; align-items: center; gap: 10px;
    }
    .card-stat { display: flex; align-items: center; gap: 4px; }
    .stat-lbl {
      font-family: 'DM Mono', monospace; font-size: 8px;
      color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase;
      flex-shrink: 0;
    }
    .stat-val {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--text); white-space: nowrap;
    }
    .stat-val.up { color: var(--green); }
    .stat-val.down { color: var(--red); }

    /* ── Card actions ── */
    .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .card-btn {
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
      background: transparent; border: 1px solid var(--border); border-radius: 2px;
      color: var(--text-muted); cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    .card-btn svg { width: 10px; height: 10px; }
    .card-btn.edit:hover { border-color: rgba(200,255,0,0.3); color: var(--accent); }
    .card-btn.del:hover { border-color: rgba(255,68,68,0.3); color: var(--red); }

    /* ── Footer ── */
    footer {
      padding: 14px 16px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 8px; flex-shrink: 0;
    }
    .footer-btn {
      display: flex; align-items: center; gap: 7px; padding: 9px 16px;
      background: transparent; border: 1px solid var(--border); border-radius: 2px;
      color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.12em; cursor: pointer; transition: all 0.15s;
    }
    .footer-btn:hover { border-color: var(--border-bright); color: var(--text); }
    .footer-btn.save:hover { border-color: rgba(200,255,0,0.4); color: var(--accent); }
    .footer-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border-bright);
      border-radius: 4px 4px 0 0; width: 100%; max-width: 520px;
      transform: translateY(20px); transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header {
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
    .modal-close {
      width: 26px; height: 26px; background: transparent;
      border: 1px solid var(--border); border-radius: 2px;
      color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: all 0.15s;
    }
    .modal-close:hover { border-color: var(--border-bright); color: var(--text); }
    .modal-body { padding: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-family: 'DM Mono', monospace; font-size: 10px;
      color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 7px;
    }
    .form-input {
      width: 100%; padding: 10px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 2px; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 16px;
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--border-bright); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .modal-btn {
      padding: 10px 20px; border-radius: 2px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 0.1em; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s;
    }
    .modal-btn.cancel { background: transparent; color: var(--text-dim); }
    .modal-btn.cancel:hover { border-color: var(--border-bright); color: var(--text); }
    .modal-btn.confirm { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .modal-btn.confirm:hover { background: #d4ff1a; }
    .modal-btn.danger { background: transparent; color: var(--red); border-color: rgba(255,68,68,0.3); }
    .modal-btn.danger:hover { border-color: var(--red); background: rgba(255,68,68,0.06); }

    /* restore */
    .file-drop {
      border: 1px dashed var(--border-bright); border-radius: 2px;
      padding: 26px; text-align: center; cursor: pointer; transition: all 0.15s; margin-bottom: 18px;
    }
    .file-drop:hover, .file-drop.drag { border-color: rgba(200,255,0,0.4); }
    .file-drop-icon { font-size: 20px; margin-bottom: 8px; }
    .file-drop-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; }
    .file-drop-label span { color: var(--accent); }
    #fileInput { display: none; }
    .file-selected { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 0.1em; margin-top: 6px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 70px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface); border: 1px solid var(--border-bright);
      border-radius: 2px; padding: 11px 18px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 0.1em; color: var(--text);
      opacity: 0; transition: all 0.2s; pointer-events: none; white-space: nowrap; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(200,255,0,0.3); color: var(--accent); }
    .toast.error { border-color: rgba(255,68,68,0.3); color: var(--red); }

    .loading-dot {
      display: inline-block; width: 5px; height: 5px;
      border-radius: 50%; background: var(--text-dim);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  </style>
</head>
<body>
<div class="app">

  <header>
    <button class="tab investments active" onclick="switchTab('investments')">
      <span>◈</span> Investissements
    </button>
    <button class="tab pnl" onclick="switchTab('pnl')">
      <span>▲</span> Pertes &amp; Profits
    </button>
  </header>

  <main>
    <div class="section active" id="section-investments">
      <div class="section-header">
        <span class="section-label">Investissements</span>
      </div>
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <p>Aucun investissement</p>
      </div>
    </div>

    <div class="section" id="section-pnl">
      <div class="section-header">
        <span class="section-label">Pertes &amp; Profits</span>
        <div class="header-actions">
          <button class="btn-sm" id="refreshBtn" onclick="refreshPrices()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
            </svg>
            Actualiser
          </button>
          <button class="btn-sm accent" onclick="openCryptoModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Ajouter
          </button>
        </div>
      </div>
      <div class="summary-bar" id="summaryBar" style="display:none">
        <div class="summary-cell"><div class="summary-label">Total PnL</div><div class="summary-value" id="sumPnl">—</div></div>
        <div class="summary-cell"><div class="summary-label">24h</div><div class="summary-value" id="sum24h">—</div></div>
      </div>
      <div class="crypto-list" id="cryptoList">
        <div class="empty-state" id="pnlEmpty">
          <div class="empty-icon">▲</div>
          <p>Aucune crypto ajoutée</p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <button class="footer-btn save" onclick="doSave()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      COPIER SAUVEGARDE
    </button>
    <button class="footer-btn restore" onclick="openRestoreModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
      </svg>
      RESTAURER
    </button>
  </footer>
</div>

<!-- Add / Edit Crypto Modal -->
<div class="modal-overlay" id="cryptoModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="cryptoModalTitle">Ajouter une crypto</span>
      <button class="modal-close" onclick="closeCryptoModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Symbole (ex: BTC, ETH, SOL)</label>
        <input class="form-input" id="inputSymbol" type="text" placeholder="BTC"
          autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" oninput="this.value=this.value.toUpperCase()" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Prix d'achat (USDC)</label>
          <input class="form-input" id="inputBuyPrice" type="number" placeholder="0.00" step="any" />
        </div>
        <div class="form-group">
          <label class="form-label">Quantité</label>
          <input class="form-input" id="inputQty" type="number" placeholder="0.00" step="any" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn danger" id="btnDelete" style="display:none;margin-right:auto" onclick="askDeleteFromEdit()">SUPPRIMER</button>
        <button class="modal-btn cancel" onclick="closeCryptoModal()">ANNULER</button>
        <button class="modal-btn confirm" id="btnConfirm" onclick="saveCrypto()">AJOUTER</button>
      </div>
    </div>
  </div>
</div>

<!-- Restore Modal -->
<div class="modal-overlay" id="restoreModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Restaurer une sauvegarde</span>
      <button class="modal-close" onclick="closeRestoreModal()">×</button>
    </div>
    <div class="modal-body">
      <p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:.08em;line-height:1.7;margin-bottom:18px;">
        Sélectionnez un fichier JSON pour restaurer vos données.
      </p>
      <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
        <div class="file-drop-icon">⬆</div>
        <div class="file-drop-label">Déposer un fichier ou <span>parcourir</span></div>
        <div class="file-selected" id="fileSelectedLabel"></div>
      </div>
      <input type="file" id="fileInput" accept=".json" onchange="onFileSelect(event)">
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeRestoreModal()">ANNULER</button>
        <button class="modal-btn confirm" onclick="doRestore()">RESTAURER</button>
      </div>
    </div>
  </div>
</div>


<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:340px;margin:0 auto 0;">
    <div class="modal-header">
      <span class="modal-title">Confirmer la suppression</span>
      <button class="modal-close" onclick="closeConfirmModal()">×</button>
    </div>
    <div class="modal-body">
      <p id="confirmText" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:.08em;line-height:1.7;margin-bottom:20px;"></p>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeConfirmModal()">ANNULER</button>
        <button class="modal-btn danger" onclick="doConfirmedDelete()">SUPPRIMER</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let appData = JSON.parse(localStorage.getItem('portfolioData') || 'null') || {
    investments: [], cryptos: [], createdAt: new Date().toISOString()
  };
  if (!appData.cryptos) appData.cryptos = [];

  let selectedFile = null;
  let liveData = {};
  let editingIdx = -1; // -1 = add mode, >= 0 = edit mode

  // ── Tabs ──
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelector(`.tab.${tab}`).classList.add('active');
    document.getElementById(`section-${tab}`).classList.add('active');
    if (tab === 'pnl') refreshPrices();
  }

  // ── CoinGecko ──
  const CGIDS = {
    BTC:'bitcoin',ETH:'ethereum',SOL:'solana',BNB:'binancecoin',XRP:'ripple',
    ADA:'cardano',DOGE:'dogecoin',AVAX:'avalanche-2',DOT:'polkadot',MATIC:'matic-network',
    LINK:'chainlink',UNI:'uniswap',ATOM:'cosmos',LTC:'litecoin',BCH:'bitcoin-cash',
    NEAR:'near',APT:'aptos',ARB:'arbitrum',OP:'optimism',SUI:'sui',
    INJ:'injective-protocol',TIA:'celestia',PEPE:'pepe',WIF:'dogwifhat',
    BONK:'bonk',FLOKI:'floki',JUP:'jupiter-exchange-solana',PYTH:'pyth-network',
    RENDER:'render-token',FET:'fetch-ai',TAO:'bittensor',AAVE:'aave',MKR:'maker',
    CRV:'curve-dao-token',LDO:'lido-dao',FTM:'fantom',ALGO:'algorand',
    HBAR:'hedera-hashgraph',ICP:'internet-computer',FIL:'filecoin',GRT:'the-graph',
    STX:'blockstack',RUNE:'thorchain',VET:'vechain',XLM:'stellar',TRX:'tron',
    XMR:'monero',DASH:'dash',IOTA:'iota',ZEC:'zcash'
  };
  function cgId(s) { return CGIDS[s.toUpperCase()] || s.toLowerCase(); }

  async function fetchPrices(symbols) {
    if (!symbols.length) return {};
    const ids = symbols.map(cgId).join(',');
    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const result = {};
    symbols.forEach(s => {
      const id = cgId(s);
      if (data[id]) result[s.toUpperCase()] = { price: data[id].usd, change24h: data[id].usd_24h_change };
    });
    return result;
  }

  async function refreshPrices() {
    if (!appData.cryptos.length) return;
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    try {
      liveData = await fetchPrices(appData.cryptos.map(c => c.symbol));
      renderCryptos();
      showToast('Prix actualisés', 'success');
    } catch { showToast('Erreur de connexion', 'error'); }
    finally { btn.classList.remove('spinning'); }
  }

  // ── Render ──
  function renderCryptos() {
    const list = document.getElementById('cryptoList');
    list.querySelectorAll('.crypto-card').forEach(c => c.remove());
    const empty = document.getElementById('pnlEmpty');
    if (!appData.cryptos.length) { empty.style.display = 'flex'; return; }
    empty.style.display = 'none';

    appData.cryptos.forEach((crypto, idx) => {
      const live = liveData[crypto.symbol] || {};
      const price = live.price;
      const change = live.change24h;
      const buyTotal = crypto.buyPrice * crypto.qty;
      const currentTotal = price != null ? price * crypto.qty : null;
      const pnl = currentTotal != null ? currentTotal - buyTotal : null;
      const pnlPct = pnl != null ? (pnl / buyTotal) * 100 : null;

      const card = document.createElement('div');
      card.className = 'crypto-card';
      const pnlClass = pnl == null ? '' : pnl >= 0 ? 'up' : 'down';
      const chgClass = change == null ? '' : change >= 0 ? 'up' : 'down';
      const pnlStr = pnl == null ? '—' : (pnl >= 0 ? '+' : '-') + '$' + fmt(Math.abs(pnl)) + (pnlPct != null ? ' / ' + (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(1) + '%' : '');
      const chgStr = change == null ? '—' : (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
      card.innerHTML = `
        <div class="card-row1">
          <span class="card-symbol">${crypto.symbol}</span>
          <span class="card-pair">/USDC</span>
          <span class="card-buy">$${fmt(crypto.buyPrice)}</span>
          <span class="card-price">${price != null ? '$' + fmt(price) : '<span class="loading-dot"></span>'}</span>
          <div class="card-actions">
            <button class="card-btn edit" onclick="openEditModal(${idx})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="card-btn del" onclick="askDelete(${idx})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="card-row2">
          <div class="card-stat">
            <span class="stat-lbl">PnL</span>
            <span class="stat-val ${pnlClass}">${pnlStr}</span>
          </div>
          <div class="card-stat">
            <span class="stat-lbl">24h</span>
            <span class="stat-val ${chgClass}">${chgStr}</span>
          </div>
          <div class="card-stat" style="margin-left:auto">
            <span class="stat-lbl">Qté</span>
            <span class="stat-val">${crypto.qty % 1 === 0 ? crypto.qty : parseFloat(crypto.qty.toFixed(4))}</span>
          </div>
        </div>
      `;
      list.appendChild(card);
    });

    // Summary
    let totalPnl = 0, total24hVal = 0, total24hBase = 0, hasPnl = false, has24h = false;
    appData.cryptos.forEach(crypto => {
      const live = liveData[crypto.symbol] || {};
      if (live.price != null) {
        const cur = live.price * crypto.qty;
        const buy = crypto.buyPrice * crypto.qty;
        totalPnl += cur - buy;
        hasPnl = true;
      }
      if (live.change24h != null && live.price != null) {
        const cur = live.price * crypto.qty;
        total24hVal += cur * (live.change24h / 100);
        total24hBase += live.price * crypto.qty / (1 + live.change24h / 100);
        has24h = true;
      }
    });
    const bar = document.getElementById('summaryBar');
    bar.style.display = appData.cryptos.length ? 'grid' : 'none';
    const sumPnlEl = document.getElementById('sumPnl');
    const sum24hEl = document.getElementById('sum24h');
    if (hasPnl) {
      sumPnlEl.textContent = (totalPnl >= 0 ? '+' : '') + '$' + fmt(Math.abs(totalPnl));
      sumPnlEl.className = 'summary-value ' + (totalPnl >= 0 ? 'up' : 'down');
    } else { sumPnlEl.textContent = '—'; sumPnlEl.className = 'summary-value'; }
    if (has24h) {
      const pct24h = total24hBase > 0 ? (total24hVal / total24hBase) * 100 : 0;
      sum24hEl.textContent = (total24hVal >= 0 ? '+' : '') + '$' + fmt(Math.abs(total24hVal)) + ' (' + (pct24h >= 0 ? '+' : '') + pct24h.toFixed(2) + '%)';
      sum24hEl.className = 'summary-value ' + (total24hVal >= 0 ? 'up' : 'down');
    } else { sum24hEl.textContent = '—'; sum24hEl.className = 'summary-value'; }
  }

  function fmt(n) {
    if (n == null) return '—';
    if (n >= 1000) return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (n >= 1) return n.toFixed(2);
    return n.toFixed(4);
  }

  // ── Add / Edit modal ──
  function openCryptoModal() {
    editingIdx = -1;
    document.getElementById('cryptoModalTitle').textContent = 'Ajouter une crypto';
    document.getElementById('btnConfirm').textContent = 'AJOUTER';
    document.getElementById('btnDelete').style.display = 'none';
    document.getElementById('inputSymbol').value = '';
    document.getElementById('inputSymbol').disabled = false;
    document.getElementById('inputBuyPrice').value = '';
    document.getElementById('inputQty').value = '';
    document.getElementById('cryptoModal').classList.add('open');
    setTimeout(() => document.getElementById('inputSymbol').focus(), 300);
  }

  function openEditModal(idx) {
    editingIdx = idx;
    const c = appData.cryptos[idx];
    document.getElementById('cryptoModalTitle').textContent = 'Modifier ' + c.symbol;
    document.getElementById('btnConfirm').textContent = 'ENREGISTRER';
    document.getElementById('btnDelete').style.display = 'block';
    document.getElementById('inputSymbol').value = c.symbol;
    document.getElementById('inputSymbol').disabled = false;
    document.getElementById('inputBuyPrice').value = c.buyPrice;
    document.getElementById('inputQty').value = c.qty;
    document.getElementById('cryptoModal').classList.add('open');
    setTimeout(() => document.getElementById('inputBuyPrice').focus(), 300);
  }

  function closeCryptoModal() {
    document.getElementById('cryptoModal').classList.remove('open');
  }

  async function saveCrypto() {
    const symbol = document.getElementById('inputSymbol').value.trim().toUpperCase();
    const buyPrice = parseFloat(document.getElementById('inputBuyPrice').value);
    const qty = parseFloat(document.getElementById('inputQty').value);

    if (!symbol) { showToast('Symbole requis', 'error'); return; }
    if (isNaN(buyPrice) || buyPrice <= 0) { showToast("Prix d'achat invalide", 'error'); return; }
    if (isNaN(qty) || qty <= 0) { showToast('Quantité invalide', 'error'); return; }

    if (editingIdx >= 0) {
      appData.cryptos[editingIdx] = { ...appData.cryptos[editingIdx], buyPrice, qty };
      saveData(); closeCryptoModal(); renderCryptos();
      showToast('Crypto modifiée', 'success');
    } else {
      appData.cryptos.push({ symbol, buyPrice, qty });
      saveData(); closeCryptoModal(); renderCryptos();
      try {
        const newData = await fetchPrices([symbol]);
        Object.assign(liveData, newData);
        renderCryptos();
      } catch {}
    }
  }

  let pendingDeleteIdx = -1;

  function askDelete(idx) {
    pendingDeleteIdx = idx;
    const sym = appData.cryptos[idx].symbol;
    document.getElementById('confirmText').textContent = 'Supprimer ' + sym + '/USDC ? Cette action est irréversible.';
    document.getElementById('confirmModal').classList.add('open');
  }

  function askDeleteFromEdit() {
    if (editingIdx < 0) return;
    closeCryptoModal();
    setTimeout(() => askDelete(editingIdx), 200);
  }

  function closeConfirmModal() {
    document.getElementById('confirmModal').classList.remove('open');
    pendingDeleteIdx = -1;
  }

  function doConfirmedDelete() {
    if (pendingDeleteIdx < 0) return;
    deleteCrypto(pendingDeleteIdx);
    closeConfirmModal();
  }

  function deleteCrypto(idx) {
    appData.cryptos.splice(idx, 1);
    saveData(); renderCryptos();
    showToast('Crypto supprimée', 'success');
  }

  // ── Persist ──
  function saveData() { localStorage.setItem('portfolioData', JSON.stringify(appData)); }

  // ── Backup ──
  async function doSave() {
    const now = new Date();
    const d = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const json = JSON.stringify({ ...appData, exportedAt: now.toISOString() }, null, 2);
    const filename = `sauvegarde-portfolio-${d}.json`;
    const file = new File([json], filename, { type: 'application/json' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file] }); }
      catch (e) { if (e.name !== 'AbortError') showToast('Erreur de partage', 'error'); }
    } else {
      const url = URL.createObjectURL(file);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }
  }

  // ── Restore ──
  function openRestoreModal() {
    selectedFile = null;
    document.getElementById('fileSelectedLabel').textContent = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('restoreModal').classList.add('open');
  }
  function closeRestoreModal() { document.getElementById('restoreModal').classList.remove('open'); }
  function onFileSelect(e) {
    selectedFile = e.target.files[0];
    if (selectedFile) document.getElementById('fileSelectedLabel').textContent = selectedFile.name;
  }
  function doRestore() {
    if (!selectedFile) { showToast('Aucun fichier sélectionné', 'error'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        appData = JSON.parse(e.target.result);
        if (!appData.cryptos) appData.cryptos = [];
        saveData(); renderCryptos(); closeRestoreModal();
        showToast('Données restaurées', 'success');
      } catch { showToast('Fichier JSON invalide', 'error'); }
    };
    reader.readAsText(selectedFile);
  }

  // ── Drag & Drop ──
  const drop = document.getElementById('fileDrop');
  drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', (e) => {
    e.preventDefault(); drop.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.json')) { selectedFile = f; document.getElementById('fileSelectedLabel').textContent = f.name; }
    else showToast('Fichier JSON requis', 'error');
  });

  ['cryptoModal','restoreModal','confirmModal'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
  });

  // ── Toast ──
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closeCryptoModal(); closeRestoreModal(); closeConfirmModal(); }
    if (e.key === 'Enter' && document.getElementById('cryptoModal').classList.contains('open')) saveCrypto();
  });

  renderCryptos();
</script>
</body>
</html>
